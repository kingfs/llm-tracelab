CreateChatCompletionRequest:
  allOf:
    - $ref: '#/components/schemas/CreateModelResponseProperties'
    - type: object
      properties:
        messages:
          description: >
            A list of messages comprising the conversation so far. Depending on the

            [model](/docs/models) you use, different message types (modalities) are

            supported, like [text](/docs/guides/text-generation),

            [images](/docs/guides/vision), and [audio](/docs/guides/audio).

          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatCompletionRequestMessage'
        model:
          description: >
            Model ID used to generate the response, like `gpt-4o` or `o3`. OpenAI

            offers a wide range of models with different capabilities, performance

            characteristics, and price points. Refer to the [model guide](/docs/models)

            to browse and compare available models.

          $ref: '#/components/schemas/ModelIdsShared'
        modalities:
          $ref: '#/components/schemas/ResponseModalities'
        verbosity:
          $ref: '#/components/schemas/Verbosity'
        reasoning_effort:
          $ref: '#/components/schemas/ReasoningEffort'
        max_completion_tokens:
          description: >
            An upper bound for the number of tokens that can be generated for a completion, including visible output tokens and [reasoning tokens](/docs/guides/reasoning).

          type: integer
          nullable: true
        frequency_penalty:
          type: number
          default: 0
          minimum: -2
          maximum: 2
          nullable: true
          description: >
            Number between -2.0 and 2.0. Positive values penalize new tokens based on

            their existing frequency in the text so far, decreasing the model's

            likelihood to repeat the same line verbatim.

        presence_penalty:
          type: number
          default: 0
          minimum: -2
          maximum: 2
          nullable: true
          description: >
            Number between -2.0 and 2.0. Positive values penalize new tokens based on

            whether they appear in the text so far, increasing the model's likelihood

            to talk about new topics.

        web_search_options:
          type: object
          title: Web search
          description: >
            This tool searches the web for relevant results to use in a response.

            Learn more about the [web search tool](/docs/guides/tools-web-search?api-mode=chat).

          properties:
            user_location:
              type: object
              nullable: true
              required:
                - type
                - approximate
              description: |
                Approximate location parameters for the search.
              properties:
                type:
                  type: string
                  description: >
                    The type of location approximation. Always `approximate`.

                  enum:
                    - approximate
                  x-stainless-const: true
                approximate:
                  $ref: '#/components/schemas/WebSearchLocation'
            search_context_size:
              $ref: '#/components/schemas/WebSearchContextSize'
        top_logprobs:
          description: >
            An integer between 0 and 20 specifying the maximum number of most likely

            tokens to return at each token position, each with an associated log

            probability. In some cases, the number of returned tokens may be fewer than

            requested.

            `logprobs` must be set to `true` if this parameter is used.

          type: integer
          minimum: 0
          maximum: 20
          nullable: true
        response_format:
          description: >
            An object specifying the format that the model must output.


            Setting to `{ "type": "json_schema", "json_schema": {...} }` enables

            Structured Outputs which ensures the model will match your supplied JSON

            schema. Learn more in the [Structured Outputs

            guide](/docs/guides/structured-outputs).


            Setting to `{ "type": "json_object" }` enables the older JSON mode, which

            ensures the message the model generates is valid JSON. Using `json_schema`

            is preferred for models that support it.

          oneOf:
            - $ref: '#/components/schemas/ResponseFormatText'
            - $ref: '#/components/schemas/ResponseFormatJsonSchema'
            - $ref: '#/components/schemas/ResponseFormatJsonObject'
          discriminator:
            propertyName: type
        audio:
          type: object
          nullable: true
          description: >
            Parameters for audio output. Required when audio output is requested with

            `modalities: ["audio"]`. [Learn more](/docs/guides/audio).

          required:
            - voice
            - format
          properties:
            voice:
              $ref: '#/components/schemas/VoiceIdsOrCustomVoice'
              description: >
                The voice the model uses to respond. Supported built-in voices are

                `alloy`, `ash`, `ballad`, `coral`, `echo`, `fable`, `nova`, `onyx`,

                `sage`, `shimmer`, `marin`, and `cedar`. You may also provide a

                custom voice object with an `id`, for example `{ "id": "voice_1234" }`.

            format:
              type: string
              enum:
                - wav
                - aac
                - mp3
                - flac
                - opus
                - pcm16
              description: >
                Specifies the output audio format. Must be one of `wav`, `mp3`, `flac`,

                `opus`, or `pcm16`.

        store:
          type: boolean
          default: false
          nullable: true
          description: >
            Whether or not to store the output of this chat completion request for

            use in our [model distillation](/docs/guides/distillation) or

            [evals](/docs/guides/evals) products.


            Supports text and image inputs. Note: image inputs over 8MB will be dropped.

        stream:
          description: >
            If set to true, the model response data will be streamed to the client

            as it is generated using [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format).

            See the [Streaming section below](/docs/api-reference/chat/streaming)

            for more information, along with the [streaming responses](/docs/guides/streaming-responses)

            guide for more information on how to handle the streaming events.

          type: boolean
          nullable: true
          default: false
        stop:
          $ref: '#/components/schemas/StopConfiguration'
        logit_bias:
          type: object
          x-oaiTypeLabel: map
          default: null
          nullable: true
          additionalProperties:
            type: integer
          description: >
            Modify the likelihood of specified tokens appearing in the completion.


            Accepts a JSON object that maps tokens (specified by their token ID in the

            tokenizer) to an associated bias value from -100 to 100. Mathematically,

            the bias is added to the logits generated by the model prior to sampling.

            The exact effect will vary per model, but values between -1 and 1 should

            decrease or increase likelihood of selection; values like -100 or 100

            should result in a ban or exclusive selection of the relevant token.

        logprobs:
          description: >
            Whether to return log probabilities of the output tokens or not. If true,

            returns the log probabilities of each output token returned in the

            `content` of `message`.

          type: boolean
          default: false
          nullable: true
        max_tokens:
          description: >
            The maximum number of [tokens](/tokenizer) that can be generated in the

            chat completion. This value can be used to control

            [costs](https://openai.com/api/pricing/) for text generated via API.


            This value is now deprecated in favor of `max_completion_tokens`, and is

            not compatible with [o-series models](/docs/guides/reasoning).

          type: integer
          nullable: true
          deprecated: true
        'n':
          type: integer
          minimum: 1
          maximum: 128
          default: 1
          example: 1
          nullable: true
          description: >-
            How many chat completion choices to generate for each input message. Note that you will be charged based on the number of generated tokens across all of the choices. Keep `n` as `1` to minimize costs.
        prediction:
          nullable: true
          description: >
            Configuration for a [Predicted Output](/docs/guides/predicted-outputs),

            which can greatly improve response times when large parts of the model

            response are known ahead of time. This is most common when you are

            regenerating a file with only minor changes to most of the content.

          oneOf:
            - $ref: '#/components/schemas/PredictionContent'
        seed:
          type: integer
          minimum: -9223372036854776000
          maximum: 9223372036854776000
          nullable: true
          deprecated: true
          description: >
            This feature is in Beta.

            If specified, our system will make a best effort to sample deterministically, such that repeated requests with the same `seed` and parameters should return the same result.

            Determinism is not guaranteed, and you should refer to the `system_fingerprint` response parameter to monitor changes in the backend.

          x-oaiMeta:
            beta: true
        stream_options:
          $ref: '#/components/schemas/ChatCompletionStreamOptions'
        tools:
          type: array
          description: |
            A list of tools the model may call. You can provide either
            [custom tools](/docs/guides/function-calling#custom-tools) or
            [function tools](/docs/guides/function-calling).
          items:
            oneOf:
              - $ref: '#/components/schemas/ChatCompletionTool'
              - $ref: '#/components/schemas/CustomToolChatCompletions'
        tool_choice:
          $ref: '#/components/schemas/ChatCompletionToolChoiceOption'
        parallel_tool_calls:
          $ref: '#/components/schemas/ParallelToolCalls'
        function_call:
          deprecated: true
          description: >
            Deprecated in favor of `tool_choice`.


            Controls which (if any) function is called by the model.


            `none` means the model will not call a function and instead generates a

            message.


            `auto` means the model can pick between generating a message or calling a

            function.


            Specifying a particular function via `{"name": "my_function"}` forces the

            model to call that function.


            `none` is the default when no functions are present. `auto` is the default

            if functions are present.

          oneOf:
            - type: string
              description: >
                `none` means the model will not call a function and instead generates a message. `auto` means the model can pick between generating a message or calling a function.

              enum:
                - none
                - auto
            - $ref: '#/components/schemas/ChatCompletionFunctionCallOption'
        functions:
          deprecated: true
          description: |
            Deprecated in favor of `tools`.

            A list of functions the model may generate JSON inputs for.
          type: array
          minItems: 1
          maxItems: 128
          items:
            $ref: '#/components/schemas/ChatCompletionFunctions'
      required:
        - model
        - messages
CreateChatCompletionResponse:
  type: object
  description: >-
    Represents a chat completion response returned by model, based on the provided input.
  properties:
    id:
      type: string
      description: A unique identifier for the chat completion.
    choices:
      type: array
      description: >-
        A list of chat completion choices. Can be more than one if `n` is greater than 1.
      items:
        type: object
        required:
          - finish_reason
          - index
          - message
          - logprobs
        properties:
          finish_reason:
            type: string
            description: >
              The reason the model stopped generating tokens. This will be `stop` if the model hit a natural stop point or a provided stop sequence,

              `length` if the maximum number of tokens specified in the request was reached,

              `content_filter` if content was omitted due to a flag from our content filters,

              `tool_calls` if the model called a tool, or `function_call` (deprecated) if the model called a function.

            enum:
              - stop
              - length
              - tool_calls
              - content_filter
              - function_call
          index:
            type: integer
            description: The index of the choice in the list of choices.
          message:
            $ref: '#/components/schemas/ChatCompletionResponseMessage'
          logprobs:
            anyOf:
              - description: Log probability information for the choice.
                type: object
                properties:
                  content:
                    anyOf:
                      - description: >-
                          A list of message content tokens with log probability information.
                        type: array
                        items:
                          $ref: '#/components/schemas/ChatCompletionTokenLogprob'
                      - type: 'null'
                  refusal:
                    anyOf:
                      - description: >-
                          A list of message refusal tokens with log probability information.
                        type: array
                        items:
                          $ref: '#/components/schemas/ChatCompletionTokenLogprob'
                      - type: 'null'
                required:
                  - content
                  - refusal
              - type: 'null'
    created:
      type: integer
      format: unixtime
      description: >-
        The Unix timestamp (in seconds) of when the chat completion was created.
    model:
      type: string
      description: The model used for the chat completion.
    service_tier:
      $ref: '#/components/schemas/ServiceTier'
    system_fingerprint:
      type: string
      deprecated: true
      description: >
        This fingerprint represents the backend configuration that the model runs with.


        Can be used in conjunction with the `seed` request parameter to understand when backend changes have been made that might impact determinism.

    object:
      type: string
      description: The object type, which is always `chat.completion`.
      enum:
        - chat.completion
      x-stainless-const: true
    usage:
      $ref: '#/components/schemas/CompletionUsage'
  required:
    - choices
    - created
    - id
    - model
    - object
  x-oaiMeta:
    name: The chat completion object
    group: chat
    example: |
      {
        "id": "chatcmpl-B9MHDbslfkBeAs8l4bebGdFOJ6PeG",
        "object": "chat.completion",
        "created": 1741570283,
        "model": "gpt-4o-2024-08-06",
        "choices": [
          {
            "index": 0,
            "message": {
              "role": "assistant",
              "content": "The image shows a wooden boardwalk path running through a lush green field or meadow. The sky is bright blue with some scattered clouds, giving the scene a serene and peaceful atmosphere. Trees and shrubs are visible in the background.",
              "refusal": null,
              "annotations": []
            },
            "logprobs": null,
            "finish_reason": "stop"
          }
        ],
        "usage": {
          "prompt_tokens": 1117,
          "completion_tokens": 46,
          "total_tokens": 1163,
          "prompt_tokens_details": {
            "cached_tokens": 0,
            "audio_tokens": 0
          },
          "completion_tokens_details": {
            "reasoning_tokens": 0,
            "audio_tokens": 0,
            "accepted_prediction_tokens": 0,
            "rejected_prediction_tokens": 0
          }
        },
        "service_tier": "default",
        "system_fingerprint": "fp_fc9f1d7035"
      }
CreateChatCompletionStreamResponse:
  type: object
  description: "Represents a streamed chunk of a chat completion response returned\nby the model, based on the provided input. \n[Learn more](/docs/guides/streaming-responses).\n"
  properties:
    id:
      type: string
      description: >-
        A unique identifier for the chat completion. Each chunk has the same ID.
    choices:
      type: array
      description: >
        A list of chat completion choices. Can contain more than one elements if `n` is greater than 1. Can also be empty for the

        last chunk if you set `stream_options: {"include_usage": true}`.

      items:
        type: object
        required:
          - delta
          - finish_reason
          - index
        properties:
          delta:
            $ref: '#/components/schemas/ChatCompletionStreamResponseDelta'
          logprobs:
            description: Log probability information for the choice.
            type: object
            nullable: true
            properties:
              content:
                description: >-
                  A list of message content tokens with log probability information.
                type: array
                items:
                  $ref: '#/components/schemas/ChatCompletionTokenLogprob'
                nullable: true
              refusal:
                description: >-
                  A list of message refusal tokens with log probability information.
                type: array
                items:
                  $ref: '#/components/schemas/ChatCompletionTokenLogprob'
                nullable: true
            required:
              - content
              - refusal
          finish_reason:
            type: string
            description: >
              The reason the model stopped generating tokens. This will be `stop` if the model hit a natural stop point or a provided stop sequence,

              `length` if the maximum number of tokens specified in the request was reached,

              `content_filter` if content was omitted due to a flag from our content filters,

              `tool_calls` if the model called a tool, or `function_call` (deprecated) if the model called a function.

            enum:
              - stop
              - length
              - tool_calls
              - content_filter
              - function_call
            nullable: true
          index:
            type: integer
            description: The index of the choice in the list of choices.
    created:
      type: integer
      format: unixtime
      description: >-
        The Unix timestamp (in seconds) of when the chat completion was created. Each chunk has the same timestamp.
    model:
      type: string
      description: The model to generate the completion.
    service_tier:
      $ref: '#/components/schemas/ServiceTier'
    system_fingerprint:
      type: string
      deprecated: true
      description: >
        This fingerprint represents the backend configuration that the model runs with.

        Can be used in conjunction with the `seed` request parameter to understand when backend changes have been made that might impact determinism.

    object:
      type: string
      description: The object type, which is always `chat.completion.chunk`.
      enum:
        - chat.completion.chunk
      x-stainless-const: true
    usage:
      $ref: '#/components/schemas/CompletionUsage'
      nullable: true
      description: >
        An optional field that will only be present when you set

        `stream_options: {"include_usage": true}` in your request. When present, it

        contains a null value **except for the last chunk** which contains the

        token usage statistics for the entire request.


        **NOTE:** If the stream is interrupted or cancelled, you may not

        receive the final usage chunk which contains the total token usage for

        the request.

  required:
    - choices
    - created
    - id
    - model
    - object
  x-oaiMeta:
    name: The chat completion chunk object
    group: chat
    example: >
      {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1694268190,"model":"gpt-4o-mini", "system_fingerprint": "fp_44709d6fcb", "choices":[{"index":0,"delta":{"role":"assistant","content":""},"logprobs":null,"finish_reason":null}]}


      {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1694268190,"model":"gpt-4o-mini", "system_fingerprint": "fp_44709d6fcb", "choices":[{"index":0,"delta":{"content":"Hello"},"logprobs":null,"finish_reason":null}]}


      ....


      {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1694268190,"model":"gpt-4o-mini", "system_fingerprint": "fp_44709d6fcb", "choices":[{"index":0,"delta":{},"logprobs":null,"finish_reason":"stop"}]}

ChatCompletionRequestMessage:
  oneOf:
    - $ref: '#/components/schemas/ChatCompletionRequestDeveloperMessage'
    - $ref: '#/components/schemas/ChatCompletionRequestSystemMessage'
    - $ref: '#/components/schemas/ChatCompletionRequestUserMessage'
    - $ref: '#/components/schemas/ChatCompletionRequestAssistantMessage'
    - $ref: '#/components/schemas/ChatCompletionRequestToolMessage'
    - $ref: '#/components/schemas/ChatCompletionRequestFunctionMessage'
  discriminator:
    propertyName: role
ChatCompletionTool:
  type: object
  title: Function tool
  description: |
    A function tool that can be used to generate a response.
  properties:
    type:
      type: string
      enum:
        - function
      description: The type of the tool. Currently, only `function` is supported.
      x-stainless-const: true
    function:
      $ref: '#/components/schemas/FunctionObject'
  required:
    - type
    - function
ChatCompletionToolChoiceOption:
  description: >
    Controls which (if any) tool is called by the model.

    `none` means the model will not call any tool and instead generates a message.

    `auto` means the model can pick between generating a message or calling one or more tools.

    `required` means the model must call one or more tools.

    Specifying a particular tool via `{"type": "function", "function": {"name": "my_function"}}` forces the model to call that tool.


    `none` is the default when no tools are present. `auto` is the default if tools are present.

  oneOf:
    - type: string
      title: Tool choice mode
      description: >
        `none` means the model will not call any tool and instead generates a message. `auto` means the model can pick between generating a message or calling one or more tools. `required` means the model must call one or more tools.

      enum:
        - none
        - auto
        - required
    - $ref: '#/components/schemas/ChatCompletionAllowedToolsChoice'
    - $ref: '#/components/schemas/ChatCompletionNamedToolChoice'
    - $ref: '#/components/schemas/ChatCompletionNamedToolChoiceCustom'
