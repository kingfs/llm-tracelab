CreateResponse:
  allOf:
    - $ref: '#/components/schemas/CreateModelResponseProperties'
    - $ref: '#/components/schemas/ResponseProperties'
    - type: object
      properties:
        input:
          $ref: '#/components/schemas/InputParam'
        include:
          anyOf:
            - type: array
              description: >-
                Specify additional output data to include in the model response. Currently supported values are:

                - `web_search_call.action.sources`: Include the sources of the web search tool call.

                - `code_interpreter_call.outputs`: Includes the outputs of python code execution in code interpreter tool call items.

                - `computer_call_output.output.image_url`: Include image urls from the computer call output.

                - `file_search_call.results`: Include the search results of the file search tool call.

                - `message.input_image.image_url`: Include image urls from the input message.

                - `message.output_text.logprobs`: Include logprobs with assistant messages.

                - `reasoning.encrypted_content`: Includes an encrypted version of reasoning tokens in reasoning item outputs. This enables reasoning items to be used in multi-turn conversations when using the Responses API statelessly (like when the `store` parameter is set to `false`, or when an organization is enrolled in the zero data retention program).
              items:
                $ref: '#/components/schemas/IncludeEnum'
            - type: 'null'
        parallel_tool_calls:
          anyOf:
            - type: boolean
              description: |
                Whether to allow the model to run tool calls in parallel.
              default: true
            - type: 'null'
        store:
          anyOf:
            - type: boolean
              description: >
                Whether to store the generated model response for later retrieval via

                API.

              default: true
            - type: 'null'
        instructions:
          anyOf:
            - type: string
              description: >
                A system (or developer) message inserted into the model's context.


                When using along with `previous_response_id`, the instructions from a previous

                response will not be carried over to the next response. This makes it simple

                to swap out system (or developer) messages in new responses.

            - type: 'null'
        stream:
          anyOf:
            - description: >
                If set to true, the model response data will be streamed to the client

                as it is generated using [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format).

                See the [Streaming section below](/docs/api-reference/responses-streaming)

                for more information.

              type: boolean
              default: false
            - type: 'null'
        stream_options:
          $ref: '#/components/schemas/ResponseStreamOptions'
        conversation:
          anyOf:
            - $ref: '#/components/schemas/ConversationParam'
            - type: 'null'
        context_management:
          anyOf:
            - type: array
              description: |
                Context management configuration for this request.
              minItems: 1
              items:
                $ref: '#/components/schemas/ContextManagementParam'
            - type: 'null'
        max_output_tokens:
          anyOf:
            - description: >
                An upper bound for the number of tokens that can be generated for a response, including visible output tokens and [reasoning tokens](/docs/guides/reasoning).

              type: integer
              minimum: 16
            - type: 'null'
Response:
  title: The response object
  allOf:
    - $ref: '#/components/schemas/ModelResponseProperties'
    - $ref: '#/components/schemas/ResponseProperties'
    - type: object
      properties:
        id:
          type: string
          description: |
            Unique identifier for this Response.
        object:
          type: string
          description: |
            The object type of this resource - always set to `response`.
          enum:
            - response
          x-stainless-const: true
        status:
          type: string
          description: >
            The status of the response generation. One of `completed`, `failed`,

            `in_progress`, `cancelled`, `queued`, or `incomplete`.

          enum:
            - completed
            - failed
            - in_progress
            - cancelled
            - queued
            - incomplete
        created_at:
          type: number
          format: unixtime
          description: |
            Unix timestamp (in seconds) of when this Response was created.
        completed_at:
          anyOf:
            - type: number
              format: unixtime
              description: >
                Unix timestamp (in seconds) of when this Response was completed.

                Only present when the status is `completed`.

            - type: 'null'
        error:
          $ref: '#/components/schemas/ResponseError'
        incomplete_details:
          anyOf:
            - type: object
              description: |
                Details about why the response is incomplete.
              properties:
                reason:
                  type: string
                  description: The reason why the response is incomplete.
                  enum:
                    - max_output_tokens
                    - content_filter
            - type: 'null'
        output:
          type: array
          description: >
            An array of content items generated by the model.


            - The length and order of items in the `output` array is dependent

              on the model's response.
            - Rather than accessing the first item in the `output` array and

              assuming it's an `assistant` message with the content generated by
              the model, you might consider using the `output_text` property where
              supported in SDKs.
          items:
            $ref: '#/components/schemas/OutputItem'
        instructions:
          anyOf:
            - description: >
                A system (or developer) message inserted into the model's context.


                When using along with `previous_response_id`, the instructions from a previous

                response will not be carried over to the next response. This makes it simple

                to swap out system (or developer) messages in new responses.

              oneOf:
                - type: string
                  description: >
                    A text input to the model, equivalent to a text input with the

                    `developer` role.

                - type: array
                  title: Input item list
                  description: >
                    A list of one or many input items to the model, containing

                    different content types.

                  items:
                    $ref: '#/components/schemas/InputItem'
            - type: 'null'
        output_text:
          anyOf:
            - type: string
              description: >
                SDK-only convenience property that contains the aggregated text output

                from all `output_text` items in the `output` array, if any are present.

                Supported in the Python and JavaScript SDKs.

              x-oaiSupportedSDKs:
                - python
                - javascript
            - type: 'null'
        usage:
          $ref: '#/components/schemas/ResponseUsage'
        parallel_tool_calls:
          type: boolean
          description: |
            Whether to allow the model to run tool calls in parallel.
          default: true
        conversation:
          anyOf:
            - default: null
              $ref: '#/components/schemas/Conversation-2'
            - type: 'null'
        max_output_tokens:
          anyOf:
            - description: >
                An upper bound for the number of tokens that can be generated for a response, including visible output tokens and [reasoning tokens](/docs/guides/reasoning).

              type: integer
            - type: 'null'
      required:
        - id
        - object
        - created_at
        - error
        - incomplete_details
        - instructions
        - model
        - tools
        - output
        - parallel_tool_calls
        - metadata
        - tool_choice
        - temperature
        - top_p
  example:
    id: resp_67ccd3a9da748190baa7f1570fe91ac604becb25c45c1d41
    object: response
    created_at: 1741476777
    status: completed
    completed_at: 1741476778
    error: null
    incomplete_details: null
    instructions: null
    max_output_tokens: null
    model: gpt-4o-2024-08-06
    output:
      - type: message
        id: msg_67ccd3acc8d48190a77525dc6de64b4104becb25c45c1d41
        status: completed
        role: assistant
        content:
          - type: output_text
            text: >-
              The image depicts a scenic landscape with a wooden boardwalk or pathway leading through lush, green grass under a blue sky with some clouds. The setting suggests a peaceful natural area, possibly a park or nature reserve. There are trees and shrubs in the background.
            annotations: []
    parallel_tool_calls: true
    previous_response_id: null
    reasoning:
      effort: null
      summary: null
    store: true
    temperature: 1
    text:
      format:
        type: text
    tool_choice: auto
    tools: []
    top_p: 1
    truncation: disabled
    usage:
      input_tokens: 328
      input_tokens_details:
        cached_tokens: 0
      output_tokens: 52
      output_tokens_details:
        reasoning_tokens: 0
      total_tokens: 380
    user: null
    metadata: {}
InputParam:
  description: |
    Text, image, or file inputs to the model, used to generate a response.

    Learn more:
    - [Text inputs and outputs](/docs/guides/text)
    - [Image inputs](/docs/guides/images)
    - [File inputs](/docs/guides/pdf-files)
    - [Conversation state](/docs/guides/conversation-state)
    - [Function calling](/docs/guides/function-calling)
  oneOf:
    - type: string
      title: Text input
      description: |
        A text input to the model, equivalent to a text input with the
        `user` role.
    - type: array
      title: Input item list
      description: |
        A list of one or many input items to the model, containing
        different content types.
      items:
        $ref: '#/components/schemas/InputItem'
InputItem:
  oneOf:
    - $ref: '#/components/schemas/EasyInputMessage'
    - type: object
      title: Item
      description: |
        An item representing part of the context for the response to be
        generated by the model. Can contain text, images, and audio inputs,
        as well as previous assistant responses and tool call outputs.
      $ref: '#/components/schemas/Item'
    - $ref: '#/components/schemas/ItemReferenceParam'
  discriminator:
    propertyName: type
