services:
  llm-tracelab:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: ${DOCKER_BUILD_GOPROXY:-${GOPROXY:-https://proxy.golang.org,direct}}
        GOSUMDB: ${DOCKER_BUILD_GOSUMDB:-${GOSUMDB:-sum.golang.org}}
        HTTP_PROXY: ${DOCKER_BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}
        HTTPS_PROXY: ${DOCKER_BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}
        NO_PROXY: ${DOCKER_BUILD_NO_PROXY:-${NO_PROXY:-}}
        http_proxy: ${DOCKER_BUILD_http_proxy:-${http_proxy:-}}
        https_proxy: ${DOCKER_BUILD_https_proxy:-${https_proxy:-}}
        no_proxy: ${DOCKER_BUILD_no_proxy:-${no_proxy:-}}
    image: llm-tracelab:local
    environment:
      LLM_TRACELAB_OUTPUT_DIR: /app/data/traces
      LLM_TRACELAB_TRACE_OUTPUT_DIR: /app/data/traces
      LLM_TRACELAB_DATABASE_DRIVER: ${LLM_TRACELAB_DATABASE_DRIVER:-sqlite}
      LLM_TRACELAB_DATABASE_DSN: ${LLM_TRACELAB_DATABASE_DSN:-}
      LLM_TRACELAB_SERVER_PORT: ${LLM_TRACELAB_SERVER_PORT:-8080}
      LLM_TRACELAB_MONITOR_PORT: ${LLM_TRACELAB_MONITOR_PORT:-8081}
      LLM_TRACELAB_MCP_ENABLED: ${LLM_TRACELAB_MCP_ENABLED:-true}
      LLM_TRACELAB_UPSTREAM_BASE_URL: ${LLM_TRACELAB_UPSTREAM_BASE_URL:-https://api.openai.com/v1}
      LLM_TRACELAB_UPSTREAM_API_KEY: ${LLM_TRACELAB_UPSTREAM_API_KEY:-}
      LLM_TRACELAB_UPSTREAM_PROVIDER_PRESET: ${LLM_TRACELAB_UPSTREAM_PROVIDER_PRESET:-openai}
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
      - ./docker-data:/app/data
    command: ["serve", "-c", "/app/config/config.yaml"]
