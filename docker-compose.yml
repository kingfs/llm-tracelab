services:
  llm-tracelab:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-tracelab:local
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      LLM_TRACELAB_UPSTREAM_BASE_URL: https://api.openai.com
      LLM_TRACELAB_UPSTREAM_API_KEY: ${LLM_TRACELAB_UPSTREAM_API_KEY:-sk-test}
      LLM_TRACELAB_OUTPUT_DIR: /var/lib/llm-tracelab/traces
      LLM_TRACELAB_SERVER_PORT: "8080"
      LLM_TRACELAB_MONITOR_PORT: "8081"
    volumes:
      - ./config/config.docker.yaml:/etc/llm-tracelab/config.yaml:ro
      - ./docker-data:/var/lib/llm-tracelab
    command: ["serve", "-c", "/etc/llm-tracelab/config.yaml"]
