<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>llm-tracelab monitor</title>
    <style>
      .trace-table-head span:nth-child(2), .trace-row > div:nth-child(2) {
        display: none !important;
      }

      .trace-table-head, .trace-row {
        grid-template-columns: 2.2fr 0.8fr 0.9fr 2.4fr 0.8fr !important;
      }

      .detail-topbar .topbar-meta > a {
        border: 1px solid rgba(34, 40, 49, 0.1) !important;
        border-radius: 8px !important;
        background: rgba(255, 255, 255, 0.72) !important;
        padding: 0 8px !important;
        height: 28px !important;
        display: inline-flex !important;
        align-items: center !important;
        justify-content: center !important;
        color: var(--muted, #5e665f) !important;
      }

      .detail-topbar .topbar-meta > a:hover {
        background: rgba(34, 40, 49, 0.05) !important;
        color: #111 !important;
      }

      .detail-topbar .inline-link {
        display: none;
      }

      .monitor-token-grid {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important;
        align-items: center !important;
        gap: 6px;
        overflow-x: auto;
      }

      .monitor-token-grid-detail {
        margin: 0;
      }

      .monitor-token-card {
        border: 1px solid rgba(34, 40, 49, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.72);
        padding: 4px 6px;
        min-width: 0;
        display: inline-flex !important;
        flex-direction: row !important;
        align-items: center !important;
        gap: 4px !important;
        white-space: nowrap !important;
        flex-shrink: 0 !important;
      }

      .monitor-token-card span {
        color: var(--muted, #5e665f);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.68rem;
        font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
        margin-bottom: 0 !important;
        display: flex;
        align-items: center;
      }

      .monitor-token-card strong {
        font-size: 0.95rem;
        line-height: 1.1;
      }

      .monitor-token-card-total {
        background: rgba(213, 228, 218, 0.52);
        border-color: rgba(25, 93, 77, 0.18);
      }

      .monitor-token-card-cached {
        background: rgba(255, 245, 224, 0.72);
        border-color: rgba(184, 120, 24, 0.2);
      }

      .monitor-token-badge {
        min-width: 120px;
        text-align: left;
      }

      .monitor-token-badge strong,
      .monitor-token-badge span {
        display: block;
      }

      .monitor-token-badge span {
        color: var(--muted, #5e665f);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.68rem;
        font-family: Helvetica Neue, Helvetica, Arial, sans-serif;
      }

      .monitor-token-badge strong {
        font-size: 1.05rem;
      }

      @media (max-width: 1100px) {
        .monitor-token-badge {
          min-width: 0;
          width: 100%;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-Dx5qa90N.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B3XqrPRb.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const tracePathPattern = /^\/traces\/[^/]+$/;
        let lastListKey = "";
        let lastDetailKey = "";

        function formatTokenValue(value) {
          return Number(value || 0).toLocaleString("zh-CN");
        }

        function buildTokenGrid(tokens, detail = false) {
          const grid = document.createElement("div");
          grid.className = detail ? "monitor-token-grid monitor-token-grid-detail" : "monitor-token-grid";

          const iconInput = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:12px; height:12px; margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>`;
          const iconOutput = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:12px; height:12px; margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>`;
          const iconTotal = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:12px; height:12px; margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>`;
          const iconCache = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:12px; height:12px; margin-right:4px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 1.1.9 2 2 2h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2zm0 5h16" /></svg>`;

          const items = [
            { label: "In", value: tokens.prompt_tokens, icon: iconInput },
            { label: "Out", value: tokens.completion_tokens, icon: iconOutput },
            { label: "Total", value: tokens.total_tokens, className: "monitor-token-card-total", icon: iconTotal },
            { label: "Cache", value: tokens.cached_tokens, className: "monitor-token-card-cached", icon: iconCache },
          ];

          for (const item of items) {
            const card = document.createElement("div");
            card.className = "monitor-token-card";
            if (item.className) {
              card.classList.add(item.className);
            }

            const label = document.createElement("span");
            label.innerHTML = (item.icon ? item.icon : "") + item.label;
            label.style.display = "flex";
            label.style.alignItems = "center";
            const value = document.createElement("strong");
            value.textContent = formatTokenValue(item.value);

            card.appendChild(label);
            card.appendChild(value);
            grid.appendChild(card);
          }

          return grid;
        }

        async function patchListPage() {
          if (window.location.pathname !== "/") {
            return;
          }

          const page = Number(new URLSearchParams(window.location.search).get("page") || "1");
          const listKey = `${window.location.pathname}?page=${page}`;
          const table = document.querySelector(".trace-table");
          const rows = Array.from(document.querySelectorAll(".trace-row"));
          if (!table || rows.length === 0) {
            return;
          }
          if (table.dataset.monitorTokensPatched === listKey && rows.every((row) => row.dataset.monitorTokensPatched === "1")) {
            return;
          }

          const resp = await fetch(`/api/traces?page=${page}&page_size=50`);
          if (!resp.ok) {
            return;
          }
          const payload = await resp.json();
          const items = Array.isArray(payload.items) ? payload.items : [];

          const headTokens = document.querySelector(".trace-table-head span:nth-child(5)");
          if (headTokens) {
            headTokens.textContent = "Token Usage";
          }

          const headTrace = document.querySelector(".trace-table-head span:nth-child(1)");
          if (headTrace && headTrace.textContent === "Trace") {
            headTrace.textContent = "Model";
          }

          const headOpen = document.querySelector(".trace-table-head span:nth-child(6)");
          if (headOpen && headOpen.textContent === "Open") {
            headOpen.textContent = "Action";
          }

          rows.forEach((row, index) => {
            const item = items[index];
            const cells = row.querySelectorAll(":scope > div");
            const tokenCell = cells[4];
            if (!item || !tokenCell) {
              return;
            }

            if (!row.dataset.clickPatched) {
              row.addEventListener("click", (e) => {
                if (!e.target.closest(".row-action-btn")) {
                  e.preventDefault();
                  e.stopPropagation();
                }
              }, true);
              row.dataset.clickPatched = "1";
              row.style.cursor = "default";
            }

            const apiText = item.operation || item.endpoint || "api";
            const apiTag = apiText.split('.').pop() || "api";
            
            if (!cells[0].dataset.apiIconInjected) {
               const modelStrong = cells[0].querySelector("strong");
               if (modelStrong) {
                  const badgeRow = document.createElement("div");
                  badgeRow.style.display = "flex";
                  badgeRow.style.alignItems = "center";
                  badgeRow.style.gap = "6px";
                  badgeRow.style.flexWrap = "wrap";
                  
                  modelStrong.parentNode.insertBefore(badgeRow, modelStrong);
                  badgeRow.appendChild(modelStrong);

                  let badgesHTML = `
                     <span title="${apiText}" style="background: rgba(34, 40, 49, 0.05); border: 1px solid rgba(34, 40, 49, 0.1); border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; color: #5e665f; font-weight: 500; cursor: help;">
                        ${apiTag}
                     </span>
                  `;

                  if (item.is_stream) {
                     badgesHTML += `
                        <span style="background: rgba(25, 93, 77, 0.1); border: 1px solid rgba(25, 93, 77, 0.2); color: #195d4d; border-radius: 4px; padding: 2px 6px; font-size: 0.65rem; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                           <span style="width: 4px; height: 4px; border-radius: 50%; background: currentcolor; display: inline-block;"></span>
                           stream
                        </span>
                     `;
                  }
                  
                  badgeRow.innerHTML += badgesHTML;
               }
               cells[0].dataset.apiIconInjected = "1";
            }

            if (!cells[5].dataset.actionsInjected) {
               cells[5].innerHTML = `
                 <div style="display: flex; gap: 6px; align-items: center; justify-content: flex-end;">
                    <a href="/traces/${item.id}" class="row-action-btn ghost-button" style="padding: 4px 10px; font-size: 0.7rem; min-height: 0; line-height: 1;">View</a>
                    <a href="/api/traces/${item.id}/download" download class="row-action-btn ghost-button" style="padding: 4px 10px; font-size: 0.7rem; min-height: 0; line-height: 1;">Download</a>
                 </div>
               `;
               cells[5].dataset.actionsInjected = "1";
            }

            const key = `${item.id}:${item.prompt_tokens}:${item.completion_tokens}:${item.total_tokens}:${item.cached_tokens}`;
            if (row.dataset.monitorTokenKey === key) {
              row.dataset.monitorTokensPatched = "1";
              return;
            }

            tokenCell.innerHTML = "";
            tokenCell.appendChild(buildTokenGrid(item));
            row.dataset.monitorTokenKey = key;
            row.dataset.monitorTokensPatched = "1";
          });

          table.dataset.monitorTokensPatched = listKey;
          lastListKey = listKey;
        }

        async function patchDetailTokenSummary() {
          if (!tracePathPattern.test(window.location.pathname)) {
            return;
          }

          const traceID = window.location.pathname.split("/").filter(Boolean)[1];
          if (!traceID) {
            return;
          }

          const topbarMeta = document.querySelector(".detail-topbar .topbar-meta");
          const detailTabs = document.querySelector(".detail-tabs");
          if (!topbarMeta) {
            return;
          }
          const existingGrid = topbarMeta.querySelector(".monitor-token-grid-detail");
          const existingBadge = topbarMeta.querySelector(".monitor-token-badge");
          if (
            topbarMeta.dataset.monitorDetailTraceId === traceID &&
            existingGrid &&
            existingGrid.dataset.monitorTraceId === traceID &&
            (!existingBadge || existingBadge.dataset.monitorTraceId === traceID)
          ) {
            return;
          }

          const resp = await fetch(`/api/traces/${traceID}`);
          if (!resp.ok) {
            return;
          }
          const payload = await resp.json();
          const usage = payload && payload.header ? payload.header.usage || {} : {};
          const prompt = Number(usage.prompt_tokens || 0);
          const completion = Number(usage.completion_tokens || 0);
          const total = Number(usage.total_tokens || 0);
          const cached = Number((usage.prompt_token_details && usage.prompt_token_details.cached_tokens) || 0);
          const key = `${traceID}:${prompt}:${completion}:${total}:${cached}`;

          const badge = topbarMeta.querySelector(".badge");
          if (badge && badge.textContent && badge.textContent.includes("tokens")) {
             badge.remove();
          }
          const monitorBadge = topbarMeta.querySelector(".monitor-token-badge");
          if (monitorBadge) {
             monitorBadge.remove();
          }

          if (topbarMeta) {
            const existing = topbarMeta.querySelector(".monitor-token-grid-detail");
            if (!existing || existing.dataset.monitorTokenKey !== key) {
              if (existing) {
                existing.remove();
              }
              const grid = buildTokenGrid({
                prompt_tokens: prompt,
                completion_tokens: completion,
                total_tokens: total,
                cached_tokens: cached,
              }, true);
              grid.dataset.monitorTokenKey = key;
              grid.dataset.monitorTraceId = traceID;
              topbarMeta.appendChild(grid);
            }
          }

          topbarMeta.dataset.monitorDetailTraceId = traceID;
          lastDetailKey = key;
        }

        function patchDetailPage() {
          if (!tracePathPattern.test(window.location.pathname)) {
            return;
          }

          const topbarMeta = document.querySelector(".detail-topbar .topbar-meta");
          if (topbarMeta && !topbarMeta.querySelector(".monitor-home-button")) {
            const backLink = document.createElement("a");
            backLink.href = "/";
            backLink.className = "monitor-home-button";
            backLink.title = "Home";
            backLink.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:14px; height:14px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>`;
            topbarMeta.insertBefore(backLink, topbarMeta.firstChild);
          }

          const downloadLink = document.querySelector('.detail-topbar .topbar-meta a[href^="/api/traces/"][href$="/download"]');
          if (downloadLink && !downloadLink.dataset.iconPatched) {
            downloadLink.setAttribute("download", "");
            downloadLink.title = "Download";
            downloadLink.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:14px; height:14px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>`;
            downloadLink.classList.remove("ghost-button");
            downloadLink.dataset.iconPatched = "1";
          }
        }

        async function patchPage() {
          patchDetailPage();
          try {
            if (window.location.pathname === "/") {
              await patchListPage();
            } else if (tracePathPattern.test(window.location.pathname)) {
              await patchDetailTokenSummary();
            }
          } catch (_) {
          }
        }

        const observer = new MutationObserver(() => {
          patchPage();
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
        window.addEventListener("popstate", patchPage);
        window.addEventListener("DOMContentLoaded", patchPage);
        patchPage();
      })();
    </script>
  </body>
</html>
