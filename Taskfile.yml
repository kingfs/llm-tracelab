version: "3"

vars:
  BIN: llm-tracelab
  CONFIG: '{{default "config/config.yaml" .CONFIG}}'

tasks:
  default:
    cmds:
      - task: build

  ui:build:
    desc: Build embedded Trace Monitor UI
    dir: web/monitor-ui
    cmds:
      - bun install --frozen-lockfile
      - bun run build

  generate:ent:
    desc: Generate ent control-plane DAO code
    cmds:
      - go generate ./ent/...

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w ./cmd ./internal ./pkg ./unittest

  fmt:check:
    desc: Check Go formatting without modifying files
    cmds:
      - >-
        sh -c 'files="$(gofmt -l ./cmd ./internal ./pkg ./unittest)";
        test -z "$files" || { echo "$files"; exit 1; }'

  lint:
    desc: Run lightweight static checks
    cmds:
      - go vet ./...

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:short:
    desc: Run short unit tests
    cmds:
      - go test -short ./...

  test:race:
    desc: Run unit tests with the Go race detector
    cmds:
      - go test -race ./...

  test:cover:
    desc: Run unit tests and write coverage.out
    cmds:
      - go test -coverprofile=coverage.out ./...

  bench:
    desc: Run all Go benchmarks with allocation stats
    cmds:
      - go test -bench=. -benchmem ./...

  bench:core:
    desc: Run benchmarks for core proxy, record/replay, router, store, and LLM packages
    cmds:
      - go test -bench=. -benchmem ./internal/proxy ./internal/router ./internal/store ./pkg/llm ./pkg/recordfile ./pkg/replay

  deps:verify:
    desc: Verify module dependencies without editing go.mod or go.sum
    cmds:
      - go mod verify
      - go list -mod=readonly ./...

  deps:tidy:
    desc: Tidy Go module files
    cmds:
      - go mod tidy

  build:go:
    desc: Build server binary without rebuilding the UI
    cmds:
      - go build -o {{.BIN}} ./cmd/server

  build:all:
    desc: Build embedded UI and server binary
    cmds:
      - task: ui:build
      - task: build:go

  build:
    desc: Build server binary and embedded UI
    cmds:
      - task: build:all

  migrate:
    desc: Rewrite legacy V2 cassettes to V3 and rebuild SQLite index
    cmds:
      - go run ./cmd/server migrate -c {{.CONFIG}}

  migrate:db:up:
    desc: Apply application database migrations
    cmds:
      - go run ./cmd/server db migrate up -c {{.CONFIG}}

  auth:init-user:
    desc: Initialize an auth user, pass USER and PASSWORD
    cmds:
      - go run ./cmd/server auth init-user -c {{.CONFIG}} --username "{{.USER}}" --password "{{.PASSWORD}}"

  auth:create-token:
    desc: Create an API token for a user, pass USER and NAME
    cmds:
      - go run ./cmd/server auth create-token -c {{.CONFIG}} --username "{{.USER}}" --name "{{.NAME}}"

  run:
    desc: Start proxy and monitor with local config
    cmds:
      - go run ./cmd/server -c {{.CONFIG}}

  docker:build:
    desc: Build Docker image
    cmds:
      - >-
        docker build
        --build-arg GOPROXY="${DOCKER_BUILD_GOPROXY:-${GOPROXY:-https://proxy.golang.org,direct}}"
        --build-arg GOSUMDB="${DOCKER_BUILD_GOSUMDB:-${GOSUMDB:-sum.golang.org}}"
        --build-arg HTTP_PROXY="${DOCKER_BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}"
        --build-arg HTTPS_PROXY="${DOCKER_BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}"
        --build-arg NO_PROXY="${DOCKER_BUILD_NO_PROXY:-${NO_PROXY:-}}"
        --build-arg http_proxy="${DOCKER_BUILD_http_proxy:-${http_proxy:-}}"
        --build-arg https_proxy="${DOCKER_BUILD_https_proxy:-${https_proxy:-}}"
        --build-arg no_proxy="${DOCKER_BUILD_no_proxy:-${no_proxy:-}}"
        -t llm-tracelab:local
        .

  docker:up:
    desc: Start llm-tracelab with docker compose
    cmds:
      - >-
        DOCKER_BUILD_GOPROXY="${DOCKER_BUILD_GOPROXY:-${GOPROXY:-https://proxy.golang.org,direct}}"
        DOCKER_BUILD_GOSUMDB="${DOCKER_BUILD_GOSUMDB:-${GOSUMDB:-sum.golang.org}}"
        DOCKER_BUILD_HTTP_PROXY="${DOCKER_BUILD_HTTP_PROXY:-${HTTP_PROXY:-}}"
        DOCKER_BUILD_HTTPS_PROXY="${DOCKER_BUILD_HTTPS_PROXY:-${HTTPS_PROXY:-}}"
        DOCKER_BUILD_NO_PROXY="${DOCKER_BUILD_NO_PROXY:-${NO_PROXY:-}}"
        DOCKER_BUILD_http_proxy="${DOCKER_BUILD_http_proxy:-${http_proxy:-}}"
        DOCKER_BUILD_https_proxy="${DOCKER_BUILD_https_proxy:-${https_proxy:-}}"
        DOCKER_BUILD_no_proxy="${DOCKER_BUILD_no_proxy:-${no_proxy:-}}"
        docker compose up --build -d

  check:
    desc: Run the default local quality gate
    cmds:
      - task: check:quick

  check:quick:
    desc: Run formatting check, lint, and short tests
    cmds:
      - task: fmt:check
      - task: lint
      - task: test:short

  check:full:
    desc: Run full validation including race tests and full build
    cmds:
      - task: check:quick
      - task: test
      - task: test:race
      - task: build:all

  clean:
    desc: Remove local build artifact
    cmds:
      - rm -f {{.BIN}}
