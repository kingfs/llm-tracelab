server:
  port: "8080" # llm proxy port, 设置openai_api_base=http://localhost:8080/v1

monitor:
  port: "8081" # 访问 http://localhost:8081 查看看板

upstream:
  base_url: "http://localhost:30080" 
  api_key: "sk-test"
  # 回放模式：不请求真实 LLM，从 .http 文件返回录制响应。设为 replay 时需设置 replay_dir。
  # mode: "proxy"   # 默认，转发到 base_url
  # mode: "replay"
  # replay_dir: "./testdata/load"  # 回放根目录，约定：replay_dir/<model>/*.http 或 replay_dir/*.http

debug:
  output_dir: "./logs"
  mask_key: false # 调试模式建议 false，方便看原始请求

chaos:
  enabled: false
  rules:
    - model: "qwen3-14b"
      rate: 1.0
      action: "error"
      status_code: 503
      message: "Simulated Upstream Overload"

    # # 场景1: 模拟 deepseek-chat 有 20% 概率超时 (延迟 10s)
    # - model: "deepseek-chat"
