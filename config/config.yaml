server:
  port: "8080"
  auth_token: ""

monitor:
  port: "8081"
  auth_token: ""

mcp:
  enabled: true
  path: "/mcp"
  auth_token: ""

auth:
  session_ttl: 24h

database:
  driver: "sqlite"
  dsn: ""
  max_open_conns: 4
  max_idle_conns: 4
  auto_migrate: true

trace:
  output_dir: "./logs"

upstream:
  base_url: "https://api.openai.com/v1"
  api_key: "sk-placeholder"
  provider_preset: "openai"
  protocol_family: ""
  routing_profile: ""
  api_version: ""
  deployment: ""
  project: ""
  location: ""
  model_resource: ""
  headers: {}

debug:
  output_dir: "./logs"
  mask_key: true

chaos:
  enabled: false
  rules: []
