server:
  port: "8080" # llm proxy port, 设置openai_api_base=http://localhost:8080/v1

monitor:
  port: "8081" # 访问 http://localhost:8081 查看看板

upstream:
  base_url: "http://localhost:30080"
  api_key: "sk-test"
  provider_preset: "openai"      # openai | azure | vllm | openrouter | fireworks | together ...
  protocol_family: ""            # 默认自动推断，目前主推 openai_compatible
  routing_profile: ""            # 默认自动推断，可显式指定 openai_default / azure_openai_v1 / azure_openai_deployment / vllm_openai
  api_version: ""                # Azure 常用，比如 2025-03-01-preview
  deployment: ""                 # Azure deployment routing 时使用

debug:
  output_dir: "./logs"
  mask_key: false # 调试模式建议 false，方便看原始请求

chaos:
  enabled: false
  rules:
    - model: "qwen3-14b"
      rate: 1.0
      action: "error"
      status_code: 503
      message: "Simulated Upstream Overload"

    # # 场景1: 模拟 deepseek-chat 有 20% 概率超时 (延迟 10s)
