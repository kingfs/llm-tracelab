server:
  port: "8080" # llm proxy port, 设置openai_api_base=http://localhost:8080/v1

monitor:
  port: "8081" # 访问 http://localhost:8081 查看看板

mcp:
  enabled: true
  path: "/mcp" # MCP streamable HTTP endpoint, 例如 http://localhost:8081/mcp
  auth_token: "" # 可选；配置后要求 Authorization: Bearer <token>

upstream:
  base_url: "http://localhost:30080/v1"
  api_key: "sk-test"
  provider_preset: "openai"      # 推荐优先用 preset；支持 verified/compatible 两类，详见 docs/UPSTREAM_PROVIDERS.md
  protocol_family: ""            # 默认自动推断，目前支持 openai_compatible / anthropic_messages / google_genai / vertex_native
  routing_profile: ""            # 默认自动推断；不支持的 preset/profile 组合会在启动时报错
  api_version: ""                # Azure 用 query 参数；Anthropic 用 anthropic-version header
  deployment: ""                 # Azure deployment routing 时使用
  project: ""                    # Vertex project-location routing 时使用
  location: ""                   # Vertex project-location routing 时使用
  model_resource: ""             # Vertex native 资源前缀，例如 publishers/google/models
  headers: {}                    # 额外上游请求头，比如 anthropic-beta

debug:
  output_dir: "./logs"
  mask_key: false # 调试模式建议 false，方便看原始请求

chaos:
  enabled: false
  rules:
    - model: "qwen3-14b"
      rate: 1.0
      action: "error"
      status_code: 503
      message: "Simulated Upstream Overload"

    # # 场景1: 模拟 deepseek-chat 有 20% 概率超时 (延迟 10s)
