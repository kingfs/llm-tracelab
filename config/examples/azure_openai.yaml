server:
  port: "8080"

monitor:
  port: "8081"

mcp:
  enabled: true
  path: "/mcp"

auth:
  session_ttl: 24h

database:
  driver: "sqlite"
  dsn: ""
  max_open_conns: 4
  max_idle_conns: 4
  auto_migrate: true

trace:
  output_dir: "./logs/azure-openai"

router:
  model_discovery:
    enabled: true
    refresh_interval: 10m
    startup_policy: "best_effort"
  selection:
    policy: "p2c"
    epsilon: 0.02
    open_window: 15s
    failure_threshold: 3
  fallback:
    on_missing_model: "reject"

upstreams:
  - id: "azure-openai"
    enabled: true
    priority: 100
    weight: 1.0
    capacity_hint: 1.0
    model_discovery: "static_only"
    static_models:
      - "gpt-4o-mini"
    upstream:
      base_url: "https://demo-resource.openai.azure.com"
      api_key: "$env:AZURE_OPENAI_API_KEY"
      provider_preset: "azure"
      protocol_family: ""
      routing_profile: ""
      api_version: "2025-03-01-preview"
      deployment: "gpt-4o-mini"
      project: ""
      location: ""
      model_resource: ""
      headers: {}

debug:
  output_dir: "./logs/azure-openai"
  mask_key: true

chaos:
  enabled: false
  rules: []
