server:
  port: "8080"

monitor:
  port: "8081"

mcp:
  enabled: true
  path: "/mcp"

auth:
  session_ttl: 24h

database:
  driver: "sqlite"
  dsn: ""
  max_open_conns: 4
  max_idle_conns: 4
  auto_migrate: true

trace:
  output_dir: "./logs/vertex"

router:
  model_discovery:
    enabled: true
    refresh_interval: 10m
    startup_policy: "best_effort"
  selection:
    policy: "p2c"
    epsilon: 0.02
    open_window: 15s
    failure_threshold: 3
  fallback:
    on_missing_model: "reject"

upstreams:
  - id: "vertex"
    enabled: true
    priority: 100
    weight: 1.0
    capacity_hint: 1.0
    model_discovery: "static_only"
    static_models:
      - "gemini-2.5-flash"
    upstream:
      base_url: "https://us-central1-aiplatform.googleapis.com"
      api_key: "$env:VERTEX_API_TOKEN"
      provider_preset: "vertex"
      protocol_family: ""
      routing_profile: ""
      api_version: ""
      deployment: ""
      project: "demo-project"
      location: "us-central1"
      model_resource: "publishers/google/models/gemini-2.5-flash"
      headers: {}

debug:
  output_dir: "./logs/vertex"
  mask_key: true

chaos:
  enabled: false
  rules: []
